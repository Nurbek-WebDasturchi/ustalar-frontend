<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Войти | Платформа мастеров</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="/css/login-ru.css" />
  </head>
  <body>
    <div class="grid-bg"></div>
    <div class="page-wrapper">
      <div class="brand">
        <h1>Ustalar Платформа</h1>
        <p>Платформа строительных специалистов</p>
      </div>
      <div class="card-box">
        <div class="tab-switcher">
          <button class="tab-btn active" onclick="switchTab('login')">
            <i class="bi bi-box-arrow-in-right"></i> Войти
          </button>
          <button class="tab-btn" onclick="switchTab('register')">
            <i class="bi bi-person-plus"></i> Регистрация
          </button>
        </div>

        <!-- LOGIN -->
        <div class="form-section active" id="loginForm">
          <div class="alert-box" id="loginAlert"></div>
          <div class="form-group">
            <label>Номер телефона</label>
            <input
              type="text"
              id="loginPhone"
              placeholder="+998 90 123 45 67" />
          </div>
          <div class="form-group">
            <label>Пароль</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="Введите пароль" />
          </div>
          <button class="submit-btn" onclick="handleLogin()">Войти</button>
        </div>

        <!-- REGISTER -->
        <div class="form-section" id="registerForm">
          <div class="alert-box" id="registerAlert"></div>
          <div class="form-group">
            <label>Имя и фамилия</label>
            <input
              type="text"
              id="regName"
              placeholder="Например: Sardor Rahmonov" />
          </div>
          <div class="form-group">
            <label>Номер телефона</label>
            <input type="text" id="regPhone" placeholder="+998 90 123 45 67" />
          </div>
          <div class="form-group">
            <label>Пароль</label>
            <input
              type="password"
              id="regPassword"
              placeholder="Минимум 6 символов" />
          </div>
          <div class="form-group">
            <label>Подтвердите пароль</label>
            <input
              type="password"
              id="regConfirm"
              placeholder="Повторите пароль" />
          </div>
          <button class="submit-btn" onclick="handleRegister()">
            Зарегистрироваться
          </button>
        </div>
      </div>

      <div class="back-link">
        <a href="../pages/rus.html"
          ><i class="bi bi-arrow-left"></i> Вернуться на главную</a
        >
      </div>
      <div class="lang-switch">
        <a href="login.html"><i class="bi bi-translate"></i> O'zbekcha</a>
      </div>
    </div>

    <script src="/js/login-ru.js"></script>
  </body>
</html>
