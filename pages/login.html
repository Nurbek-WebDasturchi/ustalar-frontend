<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirish | Ustalar Platformasi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <div class="grid-bg"></div>

    <div class="page-wrapper">
      <div class="brand">
        <h1>Ustalar Platformasi</h1>
        <p>Qurilish mutaxassislari platformasi</p>
      </div>

      <div class="card-box">
        <div class="tab-switcher">
          <button class="tab-btn active" onclick="switchTab('login')">
            <i class="bi bi-box-arrow-in-right"></i> Kirish
          </button>
          <button class="tab-btn" onclick="switchTab('register')">
            <i class="bi bi-person-plus"></i> Ro'yxatdan o'tish
          </button>
        </div>

        <!-- LOGIN -->
        <div class="form-section active" id="loginForm">
          <div class="alert-box" id="loginAlert"></div>
          <div class="form-group">
            <label>Telefon raqam</label>
            <input
              type="text"
              id="loginPhone"
              placeholder="+998 90 123 45 67" />
          </div>
          <div class="form-group">
            <label>Parol</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="Parolingizni kiriting" />
          </div>
          <button class="submit-btn" onclick="handleLogin()">Kirish</button>
        </div>

        <!-- REGISTER -->
        <div class="form-section" id="registerForm">
          <div class="alert-box" id="registerAlert"></div>
          <div class="form-group">
            <label>Ism familyangiz</label>
            <input
              type="text"
              id="regName"
              placeholder="Masalan: Sardor Rahmonov" />
          </div>
          <div class="form-group">
            <label>Telefon raqam</label>
            <input type="text" id="regPhone" placeholder="+998 90 123 45 67" />
          </div>
          <div class="form-group">
            <label>Parol</label>
            <input
              type="password"
              id="regPassword"
              placeholder="Kamida 6 ta belgi" />
          </div>
          <div class="form-group">
            <label>Parolni tasdiqlang</label>
            <input
              type="password"
              id="regConfirm"
              placeholder="Parolni takrorlang" />
          </div>
          <button class="submit-btn" onclick="handleRegister()">
            Ro'yxatdan o'tish
          </button>
        </div>
      </div>

      <div class="back-link">
        <a href="../index.html"
          ><i class="bi bi-arrow-left"></i> Bosh sahifaga qaytish</a
        >
      </div>
      <div style="text-align: center; margin-top: 12px; font-size: 0.82rem">
        <a href="login-ru.html" style="color: #64748b; text-decoration: none"
          ><i class="bi bi-translate"></i> Русский</a
        >
      </div>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
