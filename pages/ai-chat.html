<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usta AI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <link rel="stylesheet" href="../css/ai-chat.css" />
  </head>
  <body class="bg bg-dark">
    <div class="container vh-100 w-100">
      <div class="row mx-0 w-100 h-100 d-flex flex-column">
        <div class="col-12 p-3 mt-3 header">
          <div
            class="row mx-0 d-flex align-items-center justify-content-between justify-content-md-center">
            <div class="col-2 d-md-flex justify-content-end">
              <img
                src="../icons/robo.png"
                alt="AI is here"
                class="profile-img b" />
            </div>
            <div class="col-8 col-md-9 profile-info">
              <div class="fs-5 fs-md-1 fw-bold text-white">Usta AI</div>
              <span class="text-dark">onlayn</span>
            </div>
          </div>
        </div>
        <div class="col-12 chat-room">
          <h1 class="text-primary no-message">Hozircha hech narsa yo'q.</h1>
          <div class="chat">
            <div class="response-pocket"></div>
            <!-- Shu yerda boshlanadi savollaring va chat davom etadi -->
          </div>
        </div>
        <form action="#" class="p-0 d-flex">
          <div class="input-box">
            <input
              type="text"
              name="typer"
              class="typer"
              placeholder="Nimadir so'rashingiz mumkin" />
          </div>
          <button class="send-btn" type="submit">
            <span class="d-none d-md-block">Yuborish</span>
            <span class="d-block d-md-none"
              ><i class="bi bi-send-fill text-primary"></i
            ></span>
          </button>
        </form>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="/js/ai-chat.js"></script>
  </body>
</html>
